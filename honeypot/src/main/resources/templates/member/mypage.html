<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>꿀단지 - 마이페이지</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-container" style="align-items:flex-start;padding:40px 20px;">
    <div class="auth-box" style="width:500px;max-width:100%;">
        <div class="auth-header">
            <h2>🍯 마이페이지</h2>
        </div>

        <!-- 회원 정보 -->
        <div class="mypage-info">
            <div class="form-group">
                <label>이메일</label>
                <input type="text" th:value="${member.email}" readonly>
            </div>
            <div class="form-group">
                <label>이름</label>
                <input type="text" th:value="${member.name}" readonly>
            </div>
            <div class="form-group">
                <label>권한</label>
                <input type="text" th:value="${member.role}" readonly>
            </div>
            <div class="form-group">
                <label>가입일</label>
                <input type="text" th:value="${member.createdAt}" readonly>
            </div>
        </div>

        <!-- 즐겨찾기 목록 -->
        <div style="padding:0 30px 20px;">
            <h3 style="font-size:15px;color:#1E293B;margin-bottom:12px;">⭐ 즐겨찾기 단지</h3>
            <div th:if="${#lists.isEmpty(favorites)}">
                <p style="font-size:13px;color:#94A3B8;text-align:center;padding:20px 0;">
                    즐겨찾기한 단지가 없습니다.
                </p>
            </div>
            <div th:each="fav : ${favorites}" class="complex-item"
     			style="border:1px solid #E2E8F0;border-radius:8px;margin-bottom:8px;cursor:pointer;"
    			 th:onclick="'location.href=\'/?complexId=' + ${fav.complexId} + '\''">
    			<div class="complex-name" th:text="${fav.complexName}"></div>
   			 <div class="complex-meta">
     			   <span class="tag-dong" th:text="${fav.legalDong}"></span>
    			    <span class="tag-year" th:if="${fav.buildYear != null}"
    			          th:text="${fav.buildYear} + '년'"></span>
   			     <span class="tag-household" th:if="${fav.householdCount != null}"
     			         th:text="${fav.householdCount} + '세대'"></span>
   			 </div>
			</div>
        </div>

        <div class="btn-group">
            <a th:href="@{/}" class="btn-secondary">홈으로</a>
            <a th:href="@{/member/logout}" class="btn-secondary">로그아웃</a>
        </div>
    </div>
</div>

</body>
</html>
